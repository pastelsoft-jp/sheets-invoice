<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>決済完了 - 請求書メーカー for Sheets</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 40px; max-width: 480px; text-align: center; }
.icon { font-size: 64px; margin-bottom: 16px; }
h1 { font-size: 22px; margin-bottom: 12px; color: #1e8e3e; }
p { font-size: 14px; color: #5f6368; line-height: 1.8; margin-bottom: 16px; }
.steps { text-align: left; background: #f8f9fa; border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
.steps li { font-size: 13px; color: #202124; margin-bottom: 8px; line-height: 1.6; }
.steps li:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#x2705;</div>
  <h1>決済が完了しました</h1>
  <p>ご購入ありがとうございます。</p>
  <ol class="steps">
    <li>Googleスプレッドシートに戻ってください</li>
    <li>サイドバーの「決済完了を確認する」ボタンをクリック</li>
    <li>プランが自動的に有効化されます</li>
  </ol>
  <p>このページは閉じて構いません。</p>
</div>
</body>
</html>
