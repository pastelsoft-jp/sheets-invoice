<style>
/* === MANDATORY BASE CSS for GWS Add-on Sidebar === */
:root {
  --primary: #1a73e8;
  --primary-hover: #1557b0;
  --primary-light: #e8f0fe;
  --bg: #f8f9fa;
  --card-bg: #ffffff;
  --text: #202124;
  --text-secondary: #5f6368;
  --border: #dadce0;
  --error: #d93025;
  --error-bg: #fce8e6;
  --success: #1e8e3e;
  --success-bg: #e6f4ea;
  --warning: #f9ab00;
  --warning-bg: #fef7e0;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12);
  --shadow-hover: 0 2px 6px rgba(0,0,0,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  padding: 16px;
  line-height: 1.6;
}

h2 { font-size: 18px; margin-bottom: 8px; }
h3 { font-size: 15px; margin-bottom: 8px; }
h4 { font-size: 13px; font-weight: 500; margin-bottom: 6px; }

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
  font-family: inherit;
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-secondary {
  background: white;
  color: var(--primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg); border-color: var(--primary); }
.btn-secondary:active { transform: scale(0.98); }

.btn-danger {
  background: var(--error);
  color: white;
}
.btn-danger:hover { background: #c5221f; }

.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
}

.btn-icon {
  width: auto;
  padding: 6px 10px;
  min-width: 32px;
}

/* Inputs */
.input, .select, .textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color 0.2s;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
}
.textarea {
  resize: vertical;
  min-height: 60px;
}
.input.input-sm {
  padding: 6px 8px;
  font-size: 13px;
}

/* Labels */
.label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

/* Form Groups */
.form-group {
  margin-bottom: 16px;
}
.form-group-sm {
  margin-bottom: 8px;
}

/* Form Row (inline) */
.form-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.form-row .form-group {
  flex: 1;
  margin-bottom: 0;
}
.form-row .form-group-fixed {
  flex: 0 0 auto;
}

/* Messages */
.error-msg {
  color: var(--error);
  background: var(--error-bg);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 8px;
  display: none;
}
.error-msg.visible { display: block; }

.success-msg {
  color: var(--success);
  background: var(--success-bg);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 8px;
  display: none;
}
.success-msg.visible { display: block; }

.warning-msg {
  color: #e37400;
  background: var(--warning-bg);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 8px;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 12px;
}
.loading-overlay.active { display: flex; }
.loading-text {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Section Titles */
.section-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  margin-top: 16px;
}
.section-title:first-child {
  margin-top: 0;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.badge-free { background: var(--success-bg); color: var(--success); }
.badge-basic { background: var(--primary-light); color: var(--primary); }
.badge-pro { background: #fce8e6; color: #d93025; }

/* Upgrade Banner */
.upgrade-banner {
  background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 100%);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  text-align: center;
}
.upgrade-banner h3 {
  font-size: 15px;
  color: var(--primary);
  margin-bottom: 4px;
}
.upgrade-banner p {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

/* Onboarding */
.onboarding {
  text-align: center;
  padding: 24px 8px;
}
.onboarding-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.onboarding h2 {
  font-size: 18px;
  margin-bottom: 8px;
}
.onboarding > p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.onboarding-steps {
  text-align: left;
  margin-bottom: 20px;
}
.onboarding-step {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 12px;
}
.step-number {
  background: var(--primary);
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.step-text {
  font-size: 13px;
  padding-top: 2px;
}

/* Checkbox / Toggle */
.checkbox-group {
  margin-bottom: 12px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  cursor: pointer;
}
.checkbox-item input[type="checkbox"] {
  accent-color: var(--primary);
  width: 16px;
  height: 16px;
}

/* Invoice Item Row */
.item-row {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 28px 12px 12px;
  margin-bottom: 8px;
  position: relative;
}
.item-row .remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  padding: 2px 6px;
  line-height: 1;
  border-radius: 4px;
  z-index: 1;
}
.item-row .remove-btn:hover {
  color: var(--error);
  background: var(--error-bg);
}

.item-row .form-row {
  margin-bottom: 6px;
}
.item-row .form-row:last-child {
  margin-bottom: 0;
}

/* Add Item Button */
.add-item-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: transparent;
  color: var(--primary);
  cursor: pointer;
  width: 100%;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.2s;
}
.add-item-btn:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}

/* Summary Table */
.summary-table {
  width: 100%;
  font-size: 13px;
  margin-top: 12px;
}
.summary-table td {
  padding: 4px 0;
}
.summary-table td:first-child {
  color: var(--text-secondary);
}
.summary-table td:last-child {
  text-align: right;
  font-weight: 500;
}
.summary-table tr.total td {
  font-size: 15px;
  font-weight: 600;
  padding-top: 8px;
  border-top: 2px solid var(--text);
}
.summary-table tr.withholding td {
  color: var(--error);
}

/* Customer Select */
.customer-select {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.customer-select .select {
  flex: 1;
}
.customer-select .btn {
  width: auto;
  flex-shrink: 0;
}

/* Result Card */
.result-card {
  background: var(--success-bg);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 12px;
  text-align: center;
}
.result-card h3 {
  color: var(--success);
  margin-bottom: 8px;
}
.result-card .result-detail {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.result-card .btn {
  margin-top: 12px;
}

/* History List */
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.history-item:last-child {
  border-bottom: none;
}
.history-item .history-main {
  flex: 1;
}
.history-item .history-number {
  font-weight: 500;
}
.history-item .history-client {
  color: var(--text-secondary);
  font-size: 12px;
}
.history-item .history-amount {
  font-weight: 600;
  white-space: nowrap;
}

/* Footer */
.sidebar-footer {
  margin-top: 24px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.sidebar-footer a {
  color: var(--text-secondary);
  font-size: 11px;
  text-decoration: none;
}
.sidebar-footer a:hover { color: var(--primary); }

/* Info text */
.info-text {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Usage Bar */
.usage-bar-container {
  margin-top: 8px;
}
.usage-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.usage-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.3s;
}
.usage-bar-fill.warning {
  background: var(--warning);
}
.usage-bar-fill.danger {
  background: var(--error);
}
.usage-text {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  text-align: right;
}

/* Plan Table */
.plan-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.plan-table th, .plan-table td {
  padding: 6px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.plan-table th {
  color: var(--text-secondary);
  font-weight: 500;
}
.plan-table .check {
  color: var(--success);
  font-weight: bold;
}
.plan-table .lock {
  color: var(--text-secondary);
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
}
.tab:hover {
  color: var(--primary);
}
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* Settings Group */
.settings-group {
  margin-bottom: 16px;
}
.settings-group h4 {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
}

/* Divider */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 24px 16px;
  color: var(--text-secondary);
}
.empty-state-icon {
  font-size: 32px;
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 13px;
}
</style>
